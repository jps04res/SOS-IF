<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Meu Site</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">


    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4"> <div class="card shadow">
                    <div class="card-body p-4">
                        <img src="images/sos-if.png" class="img-fluid mb-4" alt="Logo SOS IF"  style="display: block; margin-left: auto; margin-right: auto; width: 300px;">
                       
                        <form id="formCadastro">
                            <div class="mb-3">
                                <label for="text" class="form-label"> Nome</label>
                                <input type="text" class="form-control" id="nome" placeholder="seu nome"> 
                            </div>

                            <div class="mb-3">
                                <label for="text" class="form-label"> Turma </label>
                                <select class="form-select" aria-label="selecione seu curso">
                                    <option selected> selecione seu curso</option>
                                    <option value="1"> Tec. em Agropecuaria</option>
                                    <option value="2">Tec. em Informatica para Internet</option>
                                    <option value="3">TEc. em Vigilancia em Saude</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="text" class="form-label">Ano do Ensino Medio</label>
                                <select class="form-select" arial-label="selecione seu ano">
                                    <option selected >seu ano</option>
                                    <option value="1">1 ano</option>
                                    <option value="2">2 ano</option>
                                    <option value="3">3 ano</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail Institucional</label>
                                <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" placeholder="••••••••" required>
                            </div>
                            
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                            </div>

                            <p id="mensagemLogin" class="mt-3 text-center fw-bold" style="display: none;"></p>

                        </form>


                    </div>
                </div>

            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
